name: CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '16'
      - run: |
          node -e "
          const v = parseInt(process.versions.node.split('.')[0]);
          console.log('npm warn EBADENGINE unsupported engine');
          console.log('npm warn EBADENGINE   required: { node: >=18 }');
          console.log('npm warn EBADENGINE   current: { node: v' + process.versions.node + ' }');
          console.error('npm error code EBADENGINE');
          console.error('npm error Required: {node: >=18}');
          console.error('npm error Actual: {node: v' + process.versions.node + '}');
          process.exit(1);
          "
